name: Deploy Aurora Quest

on:
  push:
    branches:
      - main
    paths:
      - "aurora-quest/**"
      - "docs/current/course/**"
      - "scripts/generate_aurora_quest_data.mjs"
      - ".github/workflows/aurora-quest-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: aurora-quest-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate course snapshot
        run: node scripts/generate_aurora_quest_data.mjs

      - name: Generate video library data
        run: node scripts/generate_video_library_data.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: aurora-quest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.repository_visibility == 'public' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
